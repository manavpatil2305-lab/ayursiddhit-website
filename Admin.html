      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayursiddhit | Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .hidden { display: none !important; }
        
        /* LOGO STYLING */
        .admin-logo { display: block; margin: 0 auto 15px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #2e7d32; object-fit: cover; }
        
        h2 { color: #2e7d32; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #333; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1b5e20; }
        
        .logout { background: #d32f2f; margin-top: 20px; }
        .item { background: #fff; border: 1px solid #eee; padding: 12px; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ff5252; width: auto; padding: 6px 12px; font-size: 0.8rem; margin: 0; }
    </style>
</head>
<body>

<div id="login-box" class="container">
    <img src="logo.png" class="admin-logo" alt="Ayursiddhit Logo">
    <h2>Admin Login</h2>
    <input type="password" id="pass" placeholder="Enter Admin Password">
    <button onclick="login()">Enter Dashboard</button>
</div>

<div id="admin-box" class="container hidden">
    <img src="logo.png" class="admin-logo" alt="Ayursiddhit Logo">
    <h2>Store Manager</h2>
    
    <form id="p-form">
        <h3>Add New Product</h3>
        <input type="text" id="p-name" placeholder="Product Name (e.g., Beetroot Soap)" required>
        <input type="number" id="p-price" placeholder="Price in ₹" required>
        <input type="text" id="p-img" placeholder="Firebase Image URL" required>
        <textarea id="p-desc" placeholder="Product Description..." rows="3"></textarea>
        <button type="submit">Publish to Store</button>
    </form>
    
    <div style="margin-top: 30px;">
        <h3>Live Inventory</h3>
        <div id="live-list">Loading items...</div>
    </div>
    
    <button onclick="logout()" class="logout">Secure Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOBW9PjetBbmROBV2GEMft7QM0HaGpdB0",
      authDomain: "ayursiddhitnaturals-d2ecb.firebaseapp.com",
      projectId: "ayursiddhitnaturals-d2ecb",
      storageBucket: "ayursiddhitnaturals-d2ecb.firebasestorage.app",
      messagingSenderId: "704398728935",
      appId: "1:704398728935:web:6330cb27578d80ce15cc42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.login = () => {
        if(document.getElementById('pass').value === "ayur123") {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('admin-box').classList.remove('hidden');
            listenToProducts();
        } else { alert("Access Denied: Wrong Password"); }
    };

    document.getElementById('p-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value,
                timestamp: Date.now()
            });
            alert("Success! Product is now live.");
            document.getElementById('p-form').reset();
        } catch (err) { alert("Error adding product: " + err.message); }
    };

    function listenToProducts() {
        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('live-list');
            list.innerHTML = '';
            if (snap.empty) { list.innerHTML = '<p style="text-align:center;color:#999;">No products in store.</p>'; return; }
            snap.forEach(pDoc => {
                const p = pDoc.data();
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span><b>${p.name}</b> - ₹${p.price}</span>`;
                const delBtn = document.createElement('button');
                delBtn.innerText = 'Delete';
                delBtn.className = 'del-btn';
                delBtn.onclick = () => delP(pDoc.id);
                div.appendChild(delBtn);
                list.appendChild(div);
            });
        });
    }

    window.delP = async (id) => {
        if(confirm("Permanently delete this product?")) {
            await deleteDoc(doc(db, "products", id));
        }
    };

    window.logout = () => location.reload();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Ayursiddhit | Admin Dashboard</title>
    
    <style>
        :root {
            --admin-green: #2e7d32;
            --bg-gray: #f8f9fa;
            --white: #ffffff;
            --danger: #d32f2f;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-gray); padding: 15px; margin: 0; color: #333; }
        .hidden { display: none !important; }
        
        .container { max-width: 480px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid #eee; }
        
        /* LOGO STYLING */
        .admin-logo { display: block; margin: 0 auto 15px; width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--admin-green); object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: var(--admin-green); margin-bottom: 25px; font-weight: 700; }
        h3 { font-size: 1.1rem; border-left: 4px solid var(--admin-green); padding-left: 10px; margin: 20px 0 15px; }

        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--admin-green); outline: none; box-shadow: 0 0 5px rgba(46,125,50,0.2); }
        
        button { width: 100%; padding: 16px; background: var(--admin-green); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        
        .nav-btn { background: #555; margin-bottom: 15px; padding: 10px; font-size: 0.9rem; }
        .logout { background: var(--danger); margin-top: 25px; }
        
        /* LIST STYLING */
        .item { background: #fff; border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .item span { font-weight: 600; font-size: 0.95rem; }
        .del-btn { background: #ff5252; width: auto; padding: 8px 15px; font-size: 0.85rem; margin: 0; }
    </style>
</head>
<body>

<div id="login-box" class="container">
    <img src="logo.png" class="admin-logo" alt="Logo">
    <h2>Admin Access</h2>
    <input type="password" id="pass" placeholder="Enter Secure Password">
    <button onclick="login()">Open Store Manager</button>
</div>

<div id="admin-box" class="container hidden">
    <img src="logo.png" class="admin-logo" alt="Logo">
    <button class="nav-btn" onclick="window.open('https://ayursiddhit-website.vercel.app', '_blank')">🌐 View Live Store</button>
    <h2>Dashboard</h2>
    
    <form id="p-form">
        <h3>+ Add New Product</h3>
        <input type="text" id="p-name" placeholder="Name (e.g., Neem Tulsi Soap)" required>
        <input type="number" id="p-price" placeholder="Price (₹)" required>
        <input type="text" id="p-img" placeholder="Firebase Image Link" required>
        <textarea id="p-desc" placeholder="Product Details/Benefits..." rows="3"></textarea>
        <button type="submit">Publish to Website</button>
    </form>
    
    <div style="margin-top: 30px;">
        <h3>📦 Current Inventory</h3>
        <div id="live-list">Checking products...</div>
    </div>
    
    <button onclick="logout()" class="logout">Secure Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOBW9PjetBbmROBV2GEMft7QM0HaGpdB0",
      authDomain: "ayursiddhitnaturals-d2ecb.firebaseapp.com",
      projectId: "ayursiddhitnaturals-d2ecb",
      storageBucket: "ayursiddhitnaturals-d2ecb.firebasestorage.app",
      messagingSenderId: "704398728935",
      appId: "1:704398728935:web:6330cb27578d80ce15cc42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.login = () => {
        // Your current password is set to: ayur123
        if(document.getElementById('pass').value === "ayur123") {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('admin-box').classList.remove('hidden');
            listenToProducts();
        } else { alert("Incorrect Password!"); }
    };

    document.getElementById('p-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await addDoc(collection(db, "products"), {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value,
                timestamp: Date.now()
            });
            alert("✅ Product is now live!");
            document.getElementById('p-form').reset();
        } catch (err) { alert("Failed to add product: " + err.message); }
    };

    function listenToProducts() {
        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('live-list');
            list.innerHTML = '';
            if (snap.empty) { list.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">No products found.</p>'; return; }
            snap.forEach(pDoc => {
                const p = pDoc.data();
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span><b>${p.name}</b><br><small>₹${p.price}</small></span>`;
                const delBtn = document.createElement('button');
                delBtn.innerText = 'Delete';
                delBtn.className = 'del-btn';
                delBtn.onclick = () => delP(pDoc.id);
                div.appendChild(delBtn);
                list.appendChild(div);
            });
        });
    }

    window.delP = async (id) => {
        if(confirm("Confirm: Delete product from website?")) {
            await deleteDoc(doc(db, "products", id));
        }
    };

    window.logout = () => location.reload();
</script>
</body>
</html>

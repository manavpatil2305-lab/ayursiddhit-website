<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Ayursiddhit Naturals | Dr. Prasiddhi Patil</title>
    <style>
        :root { --amazon: #131921; --green: #1b5e20; --gold: #febd69; --luxury: #d4af37; --bg: #f1f3f6; --red: #B12704; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow-x: hidden; }
        .hidden { display: none !important; }
        header { background: var(--amazon); color: white; padding: 10px 12px; position: sticky; top: 0; z-index: 2000; border-bottom: 2px solid var(--luxury); }
        .h-row { display: flex; align-items: center; justify-content: space-between; }
        .h-logo { height: 40px; width: 40px; border-radius: 50%; border: 1.5px solid var(--luxury); }
        .h-text { font-size: 0.95rem; font-weight: bold; line-height: 1.1; margin-left: 8px; }
        .h-text span { color: var(--gold); font-size: 0.6rem; display: block; }
        .h-actions { display: flex; align-items: center; gap: 10px; }
        .enquiry { text-align: right; border-right: 1px solid #444; padding-right: 10px; }
        .enquiry b { color: var(--gold); font-size: 0.75rem; display: block; }
        .signin-btn { background: none; border: none; color: white; cursor: pointer; text-align: center; min-width: 60px; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .p-card { background: white; border-radius: 8px; padding: 10px; border: 1px solid #eee; text-align: center; }
        .p-img { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; }
        .p-qty { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .p-qty button { background: var(--green); color: white; border: none; width: 25px; height: 25px; border-radius: 50%; font-weight: bold; }
        .btn-cart { background: var(--gold); border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 5px; cursor: pointer; }
        .btn-buy { background: #ffa41c; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 5px; cursor: pointer; }

        /* CHECKOUT FORM - AMAZON STYLE */
        .cart-view { padding: 15px; max-width: 500px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 0.9rem; }
        .ship-alert { background: #e8f5e9; color: #1b5e20; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; border: 1px solid #c3e6cb; }

        .floating-wa { position: fixed; bottom: 20px; right: 20px; background: #25d366; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; z-index: 3000; }
    </style>
</head>
<body>

<header>
    <div class="h-row">
        <div style="display:flex; align-items:center;">
            <img src="logo.png" class="h-logo">
            <div class="h-text">Ayursiddhit<span>By Dr. Prasiddhi Patil</span></div>
        </div>
        <div class="h-actions">
            <div class="enquiry"><span>Enquiry</span><b>8080926195</b></div>
            <button class="signin-btn" onclick="login()"><span id="user-name" style="color:var(--gold); font-size:0.6rem;">Sign In</span><b style="display:block; font-size:0.8rem;">Account</b></button>
            <button onclick="showCart()" style="background:none; border:none; position:relative; font-size: 1.3rem;">🛒<span id="badge" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:2px 5px; font-size:0.6rem;">0</span></button>
        </div>
    </div>
</header>

<div style="background: var(--red); color: white; text-align: center; padding: 8px 10px; font-size: 0.85rem; font-weight: bold; letter-spacing: 0.5px;">
    🎉 OFFER: FREE Delivery on orders above ₹800 OR buy 5+ Soaps! 🚚
</div>

<main id="main-view" class="product-grid"></main>

<div id="cart-view" class="hidden cart-view">
    <h2>Review Your Order</h2>
    <div id="cart-list"></div>
    <div style="background:white; padding:20px; border-radius:12px; border:1px solid #ddd; margin-top:15px;">
        <div id="ship-promo" class="ship-alert hidden">🎉 मोफत डिलीव्हरी अनलॉक झाली!</div>
        <h3 style="margin-top:0;">Delivery Address</h3>
        <form id="order-form">
            <input type="text" id="f-name" placeholder="Full Name" required>
            <input type="tel" id="f-phone" placeholder="Mobile Number" required pattern="[0-9]{10}">
            <div class="form-grid">
                <input type="text" id="f-house" placeholder="House/Flat No." required>
                <input type="text" id="f-floor" placeholder="Floor No.">
            </div>
            <input type="text" id="f-building" placeholder="Building/Society Name" required>
            <textarea id="f-address" placeholder="Full Address & Landmark" rows="3" required></textarea>
            <div class="form-grid">
                <input type="text" id="f-city" placeholder="City" required>
                <input type="number" id="f-pin" placeholder="Pincode" required>
            </div>
            
            <div style="border-top:1px solid #eee; padding-top:15px; margin-top:10px;">
                <p style="display:flex; justify-content:space-between;">Subtotal: <span>₹<span id="subtotal">0</span></span></p>
                <p style="display:flex; justify-content:space-between;">Shipping: <span id="ship-fee">₹50</span></p>
                <h3 style="display:flex; justify-content:space-between; color:var(--red);">Total: <span>₹<span id="total">0</span></span></h3>
                <button type="submit" class="btn-buy" style="background:#25D366; color:white; padding:15px; font-size:1rem;">🚀 Order on WhatsApp</button>
            </div>
        </form>
        <button onclick="closeCart()" style="width:100%; border:none; background:none; color:blue; margin-top:10px;">Back to Shop</button>
    </div>
</div>

<a href="https://wa.me/918080926195?text=Hi%20ayursiddhit%20naturals%20%F0%9F%A5%B0" class="floating-wa"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35"></a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    // ✅ ANALYTICS ADDED HERE
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOBW9PJetbBmROBV2GEMft7QM0HaGpdB0",
      authDomain: "ayursiddhitnaturals-d2ecb.firebaseapp.com",
      projectId: "ayursiddhitnaturals-d2ecb",
      storageBucket: "ayursiddhitnaturals-d2ecb.firebasestorage.app",
      messagingSenderId: "704398728935",
      appId: "1:704398728935:web:6330cb27578d80ce15cc42"
    };

    const app = initializeApp(firebaseConfig);
    // ✅ ENGINE TURNED ON HERE
    const analytics = getAnalytics(app);

    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.login = () => {
        setPersistence(auth, browserLocalPersistence)
        .then(() => {
            return signInWithPopup(auth, provider);
        })
        .then((result) => {
            document.getElementById('user-name').innerText = "Hi, " + result.user.displayName.split(' ')[0];
        })
        .catch((error) => {
            alert("Login Error: " + error.message);
            console.error("Auth Error:", error);
        });
    };

    onAuthStateChanged(auth, (user) => { 
        if(user) document.getElementById('user-name').innerText = "Hi, " + user.displayName.split(' ')[0]; 
    });

    let products = [];
    let cart = {};

    async function load() {
        const snap = await getDocs(collection(db, "products"));
        products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        render();
    }

    function render() {
        const grid = document.getElementById('main-view'); grid.innerHTML = '';
        products.forEach(p => {
            const q = cart[p.id] || 0;
            grid.innerHTML += `<div class="p-card"><img src="${p.image}" class="p-img"><h4 style="margin:8px 0; font-size:0.85rem;">${p.name}</h4><div style="color:var(--red); font-weight:bold;">₹${p.price}</div><div class="p-qty"><button onclick="updateQty('${p.id}',-1)">-</button><span>${q}</span><button onclick="updateQty('${p.id}',1)">+</button></div><button class="btn-cart" onclick="updateQty('${p.id}',1)">Add Cart</button><button class="btn-buy" onclick="buyNow('${p.id}')">Buy Now</button></div>`;
        });
    }

    window.updateQty = (id, d) => { cart[id] = (cart[id] || 0) + d; if(cart[id] <= 0) delete cart[id]; render(); updateBadge(); renderCart(); };
    window.buyNow = (id) => { if(!cart[id]) cart[id] = 1; showCart(); };
    function updateBadge() { document.getElementById('badge').innerText = Object.values(cart).reduce((a,b)=>a+b,0); }
    window.showCart = () => { document.getElementById('main-view').classList.add('hidden'); document.getElementById('cart-view').classList.remove('hidden'); renderCart(); };
    window.closeCart = () => { document.getElementById('main-view').classList.remove('hidden'); document.getElementById('cart-view').classList.add('hidden'); };

    function renderCart() {
        const list = document.getElementById('cart-list'); list.innerHTML = '';
        let sub = 0; let count = 0;
        for(let id in cart) {
            const p = products.find(x => x.id === id);
            if(p) { sub += p.price * cart[id]; count += cart[id]; list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${p.name} (x${cart[id]})</span><span>₹${p.price*cart[id]}</span></div>`; }
        }
        const free = (sub >= 800 || count >= 5);
        document.getElementById('subtotal').innerText = sub;
        document.getElementById('ship-fee').innerText = free ? "FREE" : "₹50";
        document.getElementById('total').innerText = sub + (free ? 0 : 50);
        if(free && count > 0) document.getElementById('ship-promo').classList.remove('hidden');
        else document.getElementById('ship-promo').classList.add('hidden');
    }

    document.getElementById('order-form').onsubmit = (e) => {
        e.preventDefault();
        const d = { name: document.getElementById('f-name').value, phone: document.getElementById('f-phone').value, house: document.getElementById('f-house').value, floor: document.getElementById('f-floor').value, bld: document.getElementById('f-building').value, addr: document.getElementById('f-address').value, city: document.getElementById('f-city').value, pin: document.getElementById('f-pin').value };
        let msg = `🛍️ *NEW ORDER: AYURSIDDHIT*\n\n`;
        for(let id in cart) { const p = products.find(x => x.id === id); msg += `- ${p.name} x ${cart[id]}\n`; }
        msg += `\n*Total:* ₹${document.getElementById('total').innerText}\n\n*Address:* ${d.house}, ${d.floor}, ${d.bld}, ${d.addr}, ${d.city} - ${d.pin}\n*Cust:* ${d.name} (${d.phone})`;
        window.open(`https://wa.me/918080926195?text=${encodeURIComponent(msg)}`);
    };

    load();

    // ✅ PWA APP INSTALLER KEPT SAFE HERE
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>

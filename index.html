<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Ayursiddhit Naturals | Dr. Prasiddhi Patil</title>
    <style>
        :root {
            --amazon-navy: #131921;
            --brand-green: #1b5e20;
            --brand-gold: #febd69;
            --luxury-gold: #d4af37;
            --bg-gray: #f1f3f6;
            --price-red: #B12704;
        }

        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-gray); padding-bottom: 20px; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* --- SMART INSTALL BANNER --- */
        #install-banner {
            background: #fff;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            position: relative;
            z-index: 2500;
        }
        .inst-logo { width: 40px; height: 40px; border-radius: 8px; margin-right: 10px; }
        .inst-text { flex-grow: 1; font-size: 0.85rem; font-weight: 600; color: #333; }
        .btn-install-now { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }

        /* HEADER */
        header { 
            background: var(--amazon-navy); 
            color: white; 
            padding: 8px 12px; 
            position: sticky; 
            top: 0; 
            z-index: 2000;
            border-bottom: 2px solid var(--luxury-gold);
        }

        .h-top-row { display: flex; align-items: center; justify-content: space-between; }
        .h-logo-section { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .h-logo { height: 38px; width: 38px; border-radius: 50%; border: 1.5px solid var(--luxury-gold); object-fit: cover; }
        .h-brand-text { font-size: 0.95rem; font-weight: 700; line-height: 1; }
        .h-brand-text span { color: var(--brand-gold); display: block; font-size: 0.55rem; font-weight: 600; text-transform: uppercase; margin-top: 2px; }

        .h-pro-actions { display: flex; align-items: center; gap: 10px; }
        .h-enquiry-pro { text-align: right; margin-right: 5px; }
        .h-enquiry-pro span { display: block; font-size: 0.5rem; color: #aaa; text-transform: uppercase; }
        .h-enquiry-pro b { display: block; color: var(--brand-gold); font-size: 0.75rem; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .h-action-item { background: none; border: none; color: white; cursor: pointer; text-align: center; padding: 0; }
        .h-action-item b { font-size: 1.1rem; display: block; }
        .h-action-item span { font-size: 0.55rem; color: #ccc; }

        .h-search-row { margin-top: 8px; }
        .h-search-box { display: flex; position: relative; width: 100%; }
        .h-search-input { width: 100%; padding: 8px 15px; border-radius: 20px; border: none; font-size: 0.85rem; outline: none; background: #fff; }
        .h-search-btn { position: absolute; right: 4px; top: 4px; bottom: 4px; background: var(--brand-green); width: 32px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        /* MOVING BANNERS */
        .ads-wrapper { background: #fff; overflow: hidden; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .ads-track { display: flex; width: calc(260px * 4 + 40px); animation: scroll 18s linear infinite; gap: 10px; padding-left: 10px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-260px * 2 - 10px)); } }
        .ad-card { flex: 0 0 260px; border-radius: 10px; padding: 10px; color: white; position: relative; display: flex; align-items: center; height: 60px; }
        .ad-1 { background: linear-gradient(45deg, #1b5e20, #388e3c); }
        .ad-2 { background: linear-gradient(45deg, #8d6e35, #c5a059); }
        .ad-text h4 { margin: 0; font-size: 0.85rem; }
        .ad-text p { margin: 2px 0 0; font-size: 0.7rem; }

        /* PRODUCT CARDS */
        .main-container { padding: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .p-card { background: white; border-radius: 8px; padding: 8px; position: relative; border: 1px solid #eee; }
        .p-badge { position: absolute; top: 6px; left: 6px; background: rgba(27, 94, 32, 0.9); color: white; font-size: 0.55rem; padding: 2px 6px; border-radius: 3px; font-weight: bold; z-index: 10; }
        .p-img { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; border-radius: 6px; }
        .p-title { font-size: 0.8rem; font-weight: 600; margin: 8px 0 4px; height: 2.4em; overflow: hidden; color: #333; line-height: 1.2; }
        .p-price { font-size: 1rem; font-weight: bold; color: var(--price-red); }
        .btn-prime { background: var(--brand-gold); color: #111; border: none; padding: 8px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 6px; font-size: 0.75rem; }

        /* FLOATING WHATSAPP */
        .floating-wa { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 3000; text-decoration: none; }

        /* CART & FORM */
        .free-ship-alert { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; border: 1px solid #c8e6c9; text-align: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; text-align: center; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="install-banner" class="hidden">
    <img src="logo.png" class="inst-logo">
    <div class="inst-text">Install Ayursiddhit App<br><small>Shop faster & save data</small></div>
    <button class="btn-install-now" onclick="triggerInstall()">Install</button>
</div>

<header>
    <div class="h-top-row">
        <div class="h-logo-section" onclick="location.reload()">
            <img src="logo.png" class="h-logo">
            <div class="h-brand-text">Ayursiddhit<span>By Dr. Prasiddhi Patil</span></div>
        </div>
        <div class="h-pro-actions">
            <div class="h-enquiry-pro"><span>Enquiry</span><b>8080926195</b></div>
            <button class="h-action-item" onclick="openLogin()"><span id="welcome-text" style="color:#febd69">Sign in</span><b style="color:white; font-size:0.75rem;">Account</b></button>
            <button class="h-action-item" onclick="showCart()" style="position:relative;"><b>🛒</b><span id="cart-badge" style="position:absolute; top:-4px; right:-6px; background:red; color:white; padding:1px 4px; border-radius:50%; font-size:0.6rem;">0</span></button>
        </div>
    </div>
    <div class="h-search-row">
        <div class="h-search-box">
            <input type="text" id="search-bar" class="h-search-input" placeholder="Search Handmade Soaps..." onkeyup="search()">
            <button class="h-search-btn">🔍</button>
        </div>
    </div>
</header>

<div class="ads-wrapper">
    <div class="ads-track">
        <div class="ad-card ad-1"><div class="ad-text"><h4>🚚 FREE DELIVERY</h4><p>On orders above <b>₹800</b></p></div></div>
        <div class="ad-card ad-2"><div class="ad-text"><h4>🧼 SOAP OFFER</h4><p>Buy <b>any 5 Soaps</b> & get<br><b>FREE SHIPPING!</b></p></div></div>
        <div class="ad-card ad-1"><div class="ad-text"><h4>🚚 FREE DELIVERY</h4><p>On orders above <b>₹800</b></p></div></div>
        <div class="ad-card ad-2"><div class="ad-text"><h4>🧼 SOAP OFFER</h4><p>Buy <b>any 5 Soaps</b> & get<br><b>FREE SHIPPING!</b></p></div></div>
    </div>
</div>

<main class="main-container" id="main-view">
    <div class="product-grid" id="product-list"></div>
</main>

<a href="https://wa.me/918080926195?text=Hi%20Ayursiddhit%20Naturals%21" class="floating-wa" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOBW9PjetBbmROBV2GEMft7QM0HaGpdB0",
      authDomain: "ayursiddhitnaturals-d2ecb.firebaseapp.com",
      projectId: "ayursiddhitnaturals-d2ecb",
      storageBucket: "ayursiddhitnaturals-d2ecb.firebasestorage.app",
      messagingSenderId: "704398728935",
      appId: "1:704398728935:web:6330cb27578d80ce15cc42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // --- INSTALL LOGIC ---
    let deferredPrompt;
    const installBanner = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.classList.remove('hidden'); // Show the banner if installable
    });

    window.triggerInstall = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBanner.classList.add('hidden');
            deferredPrompt = null;
        }
    };

    // ... REST OF YOUR PRODUCTS/CART/LOGIN LOGIC ...
    // (Ensure you copy the render, addToCart, and checkout functions from previous steps)
    let allProducts = [];
    let cart = {};

    async function load() {
        const snap = await getDocs(collection(db, "products"));
        allProducts = [];
        snap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        render(allProducts);
    }

    function render(list) {
        const grid = document.getElementById('product-list');
        grid.innerHTML = '';
        list.forEach(p => {
            grid.innerHTML += `<div class="p-card"><div class="p-badge">DR'S PICK</div><div class="p-img" style="background-image:url('${p.image}')"></div><p class="p-title">${p.name}</p><div class="p-price">₹${p.price}</div><button class="btn-prime" onclick="addToCart('${p.id}')">Add to Cart</button></div>`;
        });
    }

    window.addToCart = (id) => { cart[id] = (cart[id] || 0) + 1; updateBadge(); };
    window.updateQty = (id, delta) => { cart[id] += delta; if(cart[id] <= 0) delete cart[id]; renderCart(); updateBadge(); };
    function updateBadge() { document.getElementById('cart-badge').innerText = Object.values(cart).reduce((a, b) => a + b, 0); }

    load();
</script>
</body>
</html>

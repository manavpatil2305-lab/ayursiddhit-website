<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Ayursiddhit Naturals</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #1b5e20; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="file"] { background: #f9f9f9; padding: 10px; cursor: pointer; }
        .btn-add { background: #1b5e20; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-add:disabled { background: #888; cursor: not-allowed; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .logout-btn { background: #d32f2f; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Manage Products</h2>

    <input type="text" id="p-name" placeholder="Product Name (e.g. Neem Soap)">
    <input type="number" id="p-price" placeholder="Price (e.g. 99)">
    
    <label style="font-size: 0.8rem; color: #555; margin-bottom: 5px; display: block;">Select Image from Gallery:</label>
    <input type="file" id="p-image-file" accept="image/*">
    
    <textarea id="p-desc" placeholder="Product Description" rows="3"></textarea>
    <button id="add-btn" class="btn-add" onclick="addProduct()">Add Product to Store</button>

    <h3 style="margin-top: 30px;">Live Inventory</h3>
    <div id="inventory-list"></div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🚨 SECURITY PASSWORD LOCK 🚨
    const adminPassword = prompt("Enter Admin Password:");
    if (adminPassword !== "230501") {
        alert("Access Denied! Redirecting to store...");
        window.location.href = "/"; // Kicks them out to the main website
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAOBW9PJetbBmROBV2GEMft7QM0HaGpdB0",
        authDomain: "ayursiddhitnaturals-d2ecb.firebaseapp.com",
        projectId: "ayursiddhitnaturals-d2ecb",
        storageBucket: "ayursiddhitnaturals-d2ecb.firebasestorage.app",
        messagingSenderId: "704398728935",
        appId: "1:704398728935:web:6330cb27578d80ce15cc42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const IMGBB_API_KEY = "1074867f3a02f0963bbadfb9be7bf07d"; 

    window.addProduct = async () => {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const desc = document.getElementById('p-desc').value;
        const fileInput = document.getElementById('p-image-file');
        const file = fileInput.files[0];
        const btn = document.getElementById('add-btn');

        if(!name || !price || !file) {
            alert("Please fill name, price, and select an image!");
            return;
        }

        btn.innerText = "⏳ Uploading Image... Please wait";
        btn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('image', file);

            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();

            if(data.success) {
                const imageUrl = data.data.url;

                await addDoc(collection(db, "products"), {
                    name: name,
                    price: Number(price),
                    desc: desc,
                    image: imageUrl
                });

                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-desc').value = '';
                fileInput.value = '';
                
                alert("Product Added Successfully!");
                window.loadInventory(); // FIXED
            } else {
                alert("Image upload failed. Check API key.");
            }

        } catch (error) {
            console.error(error);
            alert("Error adding product. Check your internet connection.");
        } finally {
            btn.innerText = "Add Product to Store";
            btn.disabled = false;
        }
    };

    window.loadInventory = async () => {
        const list = document.getElementById('inventory-list');
        list.innerHTML = "Loading...";
        try {
            const snap = await getDocs(collection(db, "products"));
            list.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                list.innerHTML += `<div class="list-item">
                    <span>${data.name} - ₹${data.price}</span>
                    <button class="btn-del" onclick="deleteItem('${docSnap.id}')">Delete</button>
                </div>`;
            });
        } catch (error) {
            list.innerHTML = "Error loading inventory.";
            console.error("Firebase fetch error:", error);
        }
    };

    window.deleteItem = async (id) => {
        if(confirm("Are you sure you want to delete this product?")) {
            await deleteDoc(doc(db, "products", id));
            window.loadInventory(); // FIXED
        }
    };

    window.logout = () => {
        window.location.href = "/";
    };

    // FIXED TYPO HERE
    if (adminPassword === "230501") {
        window.loadInventory();
    }
</script>
</body>
</html>
